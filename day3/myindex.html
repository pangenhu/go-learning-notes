<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的个人简介</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      background: #f5f5f5;
      padding: 40px;
    }
    .card {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
    }
    .info {
      margin: 10px 0;
      color: #666;
    }
    .skill {
      display: inline-block;
      background: #42b983;
      color: white;
      padding: 5px 10px;
      border-radius: 6px;
      margin: 5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>我的个人主页</h1>
    <p class="info">爱好：编程、学习、运动</p>
    <p class="info">正在学习：HTML + CSS + JS</p>
    <div style="margin-top:20px">
      <span class="skill">VS Code</span>
      <span class="skill">前端</span>
      <span class="skill">自学</span>
    </div>
  </div>
</body>
</html>
