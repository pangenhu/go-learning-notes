<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>随机名言生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2c2c44);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
      font-size: 26px;
      margin-bottom: 20px;
      color: #f5f5f5;
    }

    #quoteBox {
      min-height: 120px;
      padding: 25px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      font-size: 18px;
      line-height: 1.7;
      color: #eee;
      margin-bottom: 25px;
      transition: all 0.3s ease;
    }

    #quoteBox:hover {
      background: rgba(255, 255, 255, 0.09);
    }

    button {
      padding: 14px 30px;
      font-size: 16px;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      color: #111;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .author {
      margin-top: 30px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>✨ 随机名言生成器 ✨</h1>
    <div id="quoteBox">点击按钮，获取今日灵感</div>
    <button onclick="getQuote()">换一句</button>
  </div>

  <div class="author">© 2025 算苗科技 出品</div>

  <script>
    const quotes = [
      "生活就像骑自行车，要保持平衡就得不断前进。—— 爱因斯坦",
      "成功的秘诀就是每天比昨天的自己更优秀一点。",
      "你不需要很厉害才能开始，但你需要开始才能很厉害。",
      "不要等待机会，而要创造机会。",
      "人生没有白走的路，每一步都算数。",
      "越努力，越幸运。",
      "你的坚持，终将美好。",
      "凡是值得做的事，就值得做好。",
      "自律给我自由。",
      "未来属于那些相信梦想之美的人。",
      "编程改变世界，坚持成就梦想。—— 算苗科技",
      "学习最好的时间是十年前，其次是现在。"
    ];

    function getQuote() {
      const i = Math.floor(Math.random() * quotes.length);
      document.getElementById("quoteBox").innerText = quotes[i];
    }
  </script>
</body>
</html>
